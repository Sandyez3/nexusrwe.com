<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — NexusRWE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',sans-serif; font-size:17px;
  background:#f7f8fc; color:#0d1a2a;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:2rem;
}
.card {
  background:#fff; border-radius:12px; padding:3rem;
  width:100%; max-width:520px;
  box-shadow:0 4px 30px rgba(0,0,0,0.08);
}
.logo { text-align:center; margin-bottom:2rem; }
.logo img { height:80px; }
h1 {
  font-family:'DM Serif Display',serif;
  font-size:2rem; color:#0d1a2a; margin-bottom:0.4rem;
}
.sub { color:#3a5060; margin-bottom:2rem; line-height:1.6; }
.form-group { margin-bottom:1.1rem; }
label {
  display:block; font-family:'Space Mono',monospace;
  font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase;
  color:#3a5060; margin-bottom:0.4rem; font-weight:700;
}
input, textarea, select {
  width:100%; padding:0.8rem 1rem;
  border:1.5px solid #dde4f0; border-radius:6px;
  font-family:'DM Sans',sans-serif; font-size:1rem; color:#0d1a2a;
  outline:none; background:#f7f8fc;
}
input:focus, textarea:focus { border-color:#29A8A3; background:#fff; }
textarea { height:100px; resize:vertical; }
.btn-submit {
  width:100%; padding:1rem;
  background:linear-gradient(90deg,#29A8A3,#6B5AB8);
  color:#fff; border:none; border-radius:6px;
  font-family:'Space Mono',monospace; font-size:0.72rem;
  letter-spacing:0.08em; text-transform:uppercase; font-weight:700;
  cursor:pointer; margin-top:0.5rem;
}
.btn-submit:hover { opacity:0.88; }
.back { 
  display:block; text-align:center; margin-top:1.5rem;
  color:#29A8A3; font-size:0.9rem; text-decoration:none;
}
.back:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <a href="/"><img src="https://nexusrwe.com/logo.png" alt="NexusRWE" onerror="this.style.display='none'"></a>
  </div>
  <h1 id="formTitle">Get In Touch</h1>
  <p class="sub" id="formSub">Fill in the form below and we will get back to you shortly.</p>
  <form name="contact" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="contact">
    <input type="hidden" name="inquiry-type" id="inquiryType" value="">
    <p style="display:none"><input name="bot-field"></p>
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" name="name" required placeholder="Full name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Organization</label>
      <input type="text" name="organization" placeholder="Company, hospital, or firm name">
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea name="message" placeholder="Tell us about your interest in NexusRWE..."></textarea>
    </div>
    <button type="submit" class="btn-submit">Send Message &rarr;</button>
  </form>
  <a href="/" class="back">&larr; Back to NexusRWE</a>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var type = params.get('type');
var title = document.getElementById('formTitle');
var sub = document.getElementById('formSub');
var itype = document.getElementById('inquiryType');
if (type === 'sponsor') {
  title.textContent = 'Schedule a Call';
  sub.textContent = 'Interested in generating regulatory-grade evidence? Tell us about your project.';
  itype.value = 'Sponsor Inquiry';
} else if (type === 'hospital') {
  title.textContent = 'Join Our Hospital Network';
  sub.textContent = 'Interested in joining the NexusRWE hospital network? Tell us about your institution.';
  itype.value = 'Hospital Network Inquiry';
} else if (type === 'investor') {
  title.textContent = 'Investor Deck Request';
  sub.textContent = 'We will send you our investor deck shortly. Tell us a little about yourself.';
  itype.value = 'Investor Deck Request';
}
</script>
</body>
</html>
